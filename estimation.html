<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Douglas Elliman · Estimation Megève</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--gold:#c9a84c;--bg:#f8f6f1;--bg2:#fff;--bg3:#f2ede4;--dark:#1a1610;--text:#2a2218;--text-dim:#8a7a60;--text-mid:#5a4e3a;--border:#e0d8c8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;min-height:100vh}
header{background:var(--dark);padding:36px 24px;text-align:center}
.de-logo{width:72px;height:72px;margin:0 auto 16px;display:block}
.eyebrow{font-size:9px;letter-spacing:7px;color:var(--gold);text-transform:uppercase;margin-bottom:12px}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,5vw,40px);font-weight:300;color:#f0e8d0;letter-spacing:2px;margin-bottom:8px}
.sub{font-size:11px;letter-spacing:2px;color:#8a7a60}
.prog{display:flex;gap:6px;justify-content:center;padding:16px 24px;background:var(--dark)}
.ps{height:2px;width:60px;background:#3a3020;border-radius:1px;transition:background .4s}
.ps.on{background:var(--gold)}
.wrap{max-width:660px;margin:0 auto;padding:24px 16px 60px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:3px;margin-bottom:14px;display:none}
.card.show{display:block;animation:up .4s ease}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ch{padding:18px 22px;border-bottom:1px solid var(--border);background:var(--bg3)}
.cn{font-size:9px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
.ct{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--dark)}
.cb{padding:22px}
.f{margin-bottom:18px}
.f:last-child{margin-bottom:0}
label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:7px;font-weight:500}
input,select,textarea{width:100%;padding:11px 15px;border:1px solid var(--border);border-radius:2px;font-family:'Montserrat',sans-serif;font-size:14px;color:var(--text);background:var(--bg);transition:border-color .2s;appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold)}
textarea{resize:vertical;min-height:75px}
.tg{display:flex;flex-wrap:wrap;gap:7px}
.tb{padding:8px 14px;border:1px solid var(--border);border-radius:2px;font-family:'Montserrat',sans-serif;font-size:11px;color:var(--text-mid);background:var(--bg);cursor:pointer;transition:all .2s}
.tb.on{background:var(--dark);border-color:var(--dark);color:var(--gold)}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:7px}
.ci{display:flex;align-items:center;gap:9px;padding:9px 13px;border:1px solid var(--border);border-radius:2px;cursor:pointer;transition:all .2s;background:var(--bg)}
.ci:hover,.ci.on{border-color:var(--gold)}
.ci.on{background:#fdf8ee}
.ck{width:15px;height:15px;border:1px solid var(--border);border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;transition:all .2s}
.ci.on .ck{background:var(--gold);border-color:var(--gold);color:#fff}
.cl{font-size:12px;color:var(--text-mid)}
.sv{text-align:center;font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold);margin-bottom:8px}
input[type=range]{height:3px;border:none;padding:0;accent-color:var(--gold)}
.sl{display:flex;justify-content:space-between;margin-top:5px}
.sl span{font-size:10px;color:var(--text-dim)}
.nav{display:flex;gap:10px;margin-top:22px}
.bp{flex:1;padding:13px;border:1px solid var(--border);border-radius:2px;font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);background:transparent;cursor:pointer}
.bn{flex:2;padding:13px;border:none;border-radius:2px;font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dark);background:var(--gold);cursor:pointer;font-weight:500}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
#res{display:none}
#res.show{display:block;animation:up .5s ease}
.rh{background:var(--dark);padding:30px 22px;text-align:center;border-radius:3px 3px 0 0}
.rl{font-size:9px;letter-spacing:5px;color:var(--gold);text-transform:uppercase;margin-bottom:10px}
.rp{font-family:'Cormorant Garamond',serif;font-size:clamp(30px,8vw,52px);font-weight:300;color:#f0e8d0}
.rr{font-size:12px;color:#8a7a60;margin-top:6px;letter-spacing:1px}
.rb{background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 3px 3px;padding:22px}
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:22px}
.ri{padding:13px;background:var(--bg3);border-left:2px solid #c9a84c33}
.ril{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:3px}
.riv{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--dark)}
.st{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px}
.sr{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.sn{font-size:11px;color:var(--text-mid);width:130px;flex-shrink:0}
.sbw{flex:1;height:4px;background:var(--border);border-radius:2px}
.sb{height:100%;border-radius:2px;background:linear-gradient(90deg,#c9a84c44,var(--gold));transition:width 1s}
.sp{font-size:11px;color:var(--gold);width:34px;text-align:right}
.ab{display:flex;gap:10px;margin-top:18px}
.ap{flex:1;padding:13px;border:1px solid var(--gold);border-radius:2px;font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);background:transparent;cursor:pointer}
.ap:hover{background:var(--gold);color:var(--dark)}
.ar{flex:1;padding:13px;border:1px solid var(--border);border-radius:2px;font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);background:transparent;cursor:pointer}
.disc{font-size:10px;color:var(--text-dim);line-height:1.7;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);font-style:italic}
@media print{header,.prog,.ab,.card{display:none!important}#res{display:block!important}}
</style>
</head>
