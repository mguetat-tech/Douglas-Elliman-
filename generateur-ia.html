<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Douglas Elliman · Générateur IA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--gold:#c9a84c;--gold-dim:#c9a84c22;--bg:#080806;--bg2:#0f0e09;--bg3:#141208;--text:#e8e0d0;--text-dim:#8a7a60;--text-mid:#c8bfa8;--border:#c9a84c18}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;min-height:100vh}
header{background:linear-gradient(180deg,#12100a 0%,var(--bg) 100%);padding:40px 24px 32px;text-align:center;border-bottom:1px solid var(--gold-dim)}
.eyebrow{font-size:9px;letter-spacing:7px;color:var(--gold);text-transform:uppercase;margin-bottom:14px}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,5vw,42px);font-weight:300;color:#f0e8d0;letter-spacing:2px;margin-bottom:8px}
.sub{font-size:11px;letter-spacing:2px;color:var(--text-dim)}
.gold-line{width:40px;height:1px;background:var(--gold);margin:18px auto 0}
.wrap{max-width:680px;margin:0 auto;padding:28px 16px 60px}
.form-card{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:24px;margin-bottom:16px}
.form-title{font-size:9px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:20px}
.f{margin-bottom:18px}
.f:last-child{margin-bottom:0}
label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;font-weight:500}
textarea,input,select{width:100%;padding:12px 16px;border:1px solid #c9a84c22;border-radius:2px;font-family:'Montserrat',sans-serif;font-size:13px;color:var(--text-mid);background:#0d0d08;transition:border-color .2s;appearance:none}
textarea:focus,input:focus,select:focus{outline:none;border-color:var(--gold)}
textarea{resize:vertical;min-height:100px;line-height:1.7}
select option{background:#0d0d08}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.plat-group{display:flex;gap:8px;flex-wrap:wrap}
.plat-btn{padding:9px 18px;border:1px solid #c9a84c33;border-radius:2px;font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);background:transparent;cursor:pointer;transition:all .2s}
.plat-btn.on{background:var(--gold);border-color:var(--gold);color:#080806}
.btn-gen{width:100%;padding:16px;border:none;border-radius:2px;font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#080806;background:var(--gold);cursor:pointer;transition:all .3s;font-weight:500;margin-top:20px}
.btn-gen:disabled{opacity:0.5;cursor:not-allowed}
.loading{display:none;text-align:center;padding:32px}
.loading.show{display:block}
.spinner{width:32px;height:32px;border:2px solid #c9a84c22;border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:12px;color:var(--text-dim);letter-spacing:2px}
.results{display:none}
.results.show{display:block;animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.result-card{background:var(--bg2);border:1px solid var(--border);border-radius:3px;margin-bottom:14px;overflow:hidden}
.result-header{padding:16px 20px;border-bottom:1px solid var(--border);background:var(--bg3)}
.result-platform{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
.result-body{padding:20px}
.result-text{white-space:pre-wrap;font-size:13px;line-height:1.9;color:var(--text-mid);background:#0d0d08;border:1px solid #c9a84c12;border-radius:2px;padding:16px;margin-bottom:14px;font-family:'Montserrat',sans-serif;font-weight:300;max-height:320px;overflow-y:auto}
.copy-btn{width:100%;padding:12px;border:none;border-radius:2px;font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#080806;background:var(--gold);cursor:pointer;transition:all .3s;font-weight:500}
.copy-btn.copied{background:#1e3a12;color:#6dbe3a}
.btn-again{width:100%;padding:13px;border:1px solid #c9a84c33;border-radius:2px;font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);background:transparent;cursor:pointer;margin-top:8px;transition:all .2s}
.error{display:none;background:#1a0808;border:1px solid #c9a84c33;border-radius:3px;padding:20px;text-align:center;color:#c9a84c;font-size:12px;margin-top:16px}
.error.show{display:block}
</style>
</head>
<body>
<header>
<div class="eyebrow">Douglas Elliman · Megève</div>
<h1>Générateur de Posts IA</h1>
<p class="sub">Décrivez le bien · L'IA rédige le post</p>
<div class="gold-line"></div>
</header>
<div class="wrap">
<div class="form-card">
<div class="form-title">Décrivez le bien à promouvoir</div>
<div class="f">
<label>Description du bien</label>
<textarea id="description" placeholder="Ex: Chalet 400m² Mont d'Arbois, vue Mont-Blanc, piscine intérieure, ski-in ski-out, 6 chambres, finitions haut de gamme..."></textarea>
</div>
<div class="two">
<div class="f">
<label>Type de bien</label>
<select id="type">
<option value="chalet">Chalet</option>
<option value="appartement">Appartement</option>
<option value="chalet hôtel">Chalet hôtel</option>
<option value="terrain">Terrain</option>
<option value="propriété atypique">Propriété atypique</option>
</select>
</div>
<div class="f">
<label>Objectif</label>
<select id="objectif">
<option value="trouver des vendeurs">Trouver vendeurs</option>
<option value="attirer des acheteurs">Attirer acheteurs</option>
<option value="notoriété agence">Notoriété agence</option>
<option value="bien off-market">Off-market</option>
</select>
</div>
</div>
<div class="f">
<label>Ton souhaité</label>
<select id="ton">
<option value="luxe et discret">Luxe & discret</option>
<option value="émotionnel et storytelling">Émotionnel & storytelling</option>
<option value="expert et analytique">Expert & analytique</option>
<option value="urgent et dynamique">Urgent & dynamique</option>
</select>
</div>
<div class="f">
<label>Plateformes</label>
<div class="plat-group">
<button class="plat-btn on" id="btn-ig" onclick="togglePlat('instagram',this)">📸 Instagram</button>
<button class="plat-btn on" id="btn-li" onclick="togglePlat('linkedin',this)">💼 LinkedIn</button>
</div>
</div>
<button class="btn-gen" onclick="generatePosts()" id="gen-btn">✦ Générer les posts</button>
</div>
<div class="loading" id="loading">
<div class="spinner"></div>
<div class="loading-text">L'IA rédige vos posts...</div>
</div>
<div class="error" id="error">Une erreur s'est produite. Vérifiez votre connexion et réessayez.</div>
<div class="results" id="results"></div>
<button class="btn-again" id="btn-again" style="display:none" onclick="generatePosts()">↺ Générer de nouvelles versions</button>
</div>
<script>
const platforms={instagram:true,linkedin:true};
function togglePlat(p,btn){platforms[p]=!platforms[p];btn.classList.toggle('on',platforms[p]);}
async function generatePosts(){
const description=document.getElementById('description').value.trim();
if(!description){document.getElementById('description').focus();return;}
if(!platforms.instagram&&!platforms.linkedin)return;
const type=document.getElementById('type').value;
const objectif=document.getElementById('objectif').value;
const ton=document.getElementById('ton').value;
document.getElementById('gen-btn').disabled=true;
document.getElementById('loading').classList.add('show');
document.getElementById('results').classList.remove('show');
document.getElementById('results').innerHTML='';
document.getElementById('error').classList.remove('show');
document.getElementById('btn-again').style.display='none';
const platList=[];
if(platforms.instagram)platList.push('Instagram');
if(platforms.linkedin)platList.push('LinkedIn');
const prompt=`Tu es expert en marketing immobilier de luxe pour Douglas Elliman France, spécialisé sur Megève et les Alpes françaises.

Rédige ${platList.length>1?'un post Instagram ET un post LinkedIn':`un post ${platList[0]}`} pour promouvoir ce bien.

BIEN : ${type}
DESCRIPTION : ${description}
OBJECTIF : ${objectif}
TON : ${ton}

RÈGLES :
- Ne jamais mentionner de prix
- Ton luxe, discret et professionnel
- Signature Douglas Elliman Megève
- Instagram : émotionnel, 150-200 mots, emojis subtils, 5-7 hashtags
- LinkedIn : professionnel, 200-250 mots, 3-4 hashtags

Réponds en JSON uniquement :
{"instagram":"texte complet avec hashtags","linkedin":"texte complet avec hashtags"}`;
try{
const response=await fetch('https://api.anthropic.com/v1/messages',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
});
const data=await response.json();
const raw=data.content[0].text;
let posts;
try{const clean=raw.replace(/```json|```/g,'').trim();posts=JSON.parse(clean);}
catch{throw new Error('Parsing error');}
const resultsEl=document.getElementById('results');
resultsEl.innerHTML='';
if(platforms.instagram&&posts.instagram)resultsEl.innerHTML+=createCard('📸 Instagram',posts.instagram);
if(platforms.linkedin&&posts.linkedin)resultsEl.innerHTML+=createCard('💼 LinkedIn',posts.linkedin);
resultsEl.classList.add('show');
document.getElementById('btn-again').style.display='block';
}catch(e){document.getElementById('error').classList.add('show');}
finally{document.getElementById('loading').classList.remove('show');document.getElementById('gen-btn').disabled=false;}
}
function createCard(platform,text){
const id='r'+Math.random().toString(36).substr(2,6);
return`<div class="result-card"><div class="result-header"><div class="result-platform">${platform}</div></div><div class="result-body"><div class="result-text" id="${id}">${text}</div><button class="copy-btn" onclick="copyPost('${id}',this)">Copier ce post</button></div></div>`;
}
function copyPost(id,btn){
navigator.clipboard.writeText(document.getElementById(id).textContent).then(()=>{
btn.textContent='✓ Copié !';btn.classList.add('copied');
setTimeout(()=>{btn.textContent='Copier ce post';btn.classList.remove('copied');},2500);
});
}
</script>
</body>
</html>
